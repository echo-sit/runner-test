name: Self-hosted Runner Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, dev]
    steps:
      - name: Print runner info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

      - name: Check proxy environment
        run: |
          echo "HTTP_PROXY: $HTTP_PROXY"
          echo "HTTPS_PROXY: $HTTPS_PROXY"

      - name: Test network connectivity to GitHub
        run: |
          curl -sSf --max-time 10 https://github.com > /dev/null && echo "✅ GitHub reachable" || echo "❌ GitHub unreachable"

      - name: Test Docker availability
        run: |
          docker version --format "Docker: {{.Server.Version}}"
          docker ps --format "Running containers: {{.Names}}" | head -5
